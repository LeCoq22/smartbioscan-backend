<style>
:root{--teal:#0d7377;--teal-lt:#14a5a9;--teal-dim:#0d737712;--teal-mid:#0d737330;--ink:#0f1923;--ink-mid:#374151;--ink-lt:#6b7280;--border:#d1d5db;--bg:#eef2f7;--white:#fff;--green:#15803d;--green-bg:#dcfce7;--orange:#c2410c;--orange-bg:#ffedd5;--red:#b91c1c;--red-bg:#fee2e2;--blue:#1d4ed8;--page-w:210mm}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:12px;line-height:1.45}
#controls{position:sticky;top:0;z-index:100;background:#0f1923;color:#fff;display:flex;align-items:center;gap:10px;padding:8px 20px;flex-wrap:wrap}
#controls .ct{flex:1;font-size:13px;font-weight:500}
#controls button,#controls label{padding:5px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-print{background:var(--teal-lt);color:#fff}
.btn-csv{background:#374151;color:#fff}
#csv-input{display:none}
#report-area{padding:20px 16px}
.page{width:var(--page-w);background:var(--white);margin:0 auto 20px;padding:11mm 11mm 14mm;box-shadow:0 2px 20px rgba(0,0,0,.12);border-radius:3px;position:relative;page-break-after:always}
.rh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid var(--teal);padding-bottom:6px;margin-bottom:8px}
.rh-l .brand{font-size:19px;font-weight:700;color:var(--teal);letter-spacing:-.5px}
.rh-l .sub{font-size:9.5px;color:var(--ink-lt);margin-top:1px}
.rh-r{text-align:right}
.rh-r .pname{font-size:14px;font-weight:600}
.rh-r .pdate{font-size:9.5px;color:var(--ink-lt);margin-top:2px}
.rh-r .nutri{font-size:9.5px;color:var(--teal);margin-top:1px}
.vrow{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:9px}
.vc{background:#f8fafc;border:1px solid var(--border);border-radius:5px;padding:5px 7px}
.vc.hi{background:var(--teal-dim);border-color:#99d6d8}
.vc-lbl{font-size:8.5px;color:var(--ink-lt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.vc-val{font-size:17px;font-weight:700;color:var(--ink);line-height:1}
.vc-unit{font-size:8.5px;color:var(--ink-lt)}
.st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--teal);border-bottom:1px solid var(--teal-mid);padding-bottom:2px;margin:9px 0 5px}
.st-dot{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--ink);margin:9px 0 5px;display:flex;align-items:center;gap:6px}
.st-dot::before{content:'';display:block;width:8px;height:8px;border-radius:50%;background:var(--teal)}
.kpg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.kpc{border:1px solid var(--border);border-radius:6px;padding:6px 8px}
.kpc-lbl{font-size:8.5px;color:var(--ink-lt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.kpc-val{font-size:20px;font-weight:700;color:var(--ink);line-height:1.05}
.kpc-unit{font-size:8.5px;color:var(--ink-lt);margin-top:1px}
.b{display:inline-block;font-size:8.5px;font-weight:600;padding:1px 7px;border-radius:20px;margin-top:3px}
.b-g{background:var(--green-bg);color:var(--green)}
.b-o{background:var(--orange-bg);color:var(--orange)}
.b-r{background:var(--red-bg);color:var(--red)}
.b-t{background:var(--teal-dim);color:var(--teal)}
.b-b{background:#dbeafe;color:#1d4ed8}
.brow{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.blbl{width:90px;font-size:9.5px;color:var(--ink-mid);text-align:right;flex-shrink:0}
.btrk{flex:1;height:9px;background:#f1f5f9;border-radius:20px;overflow:hidden}
.bfil{height:100%;border-radius:20px}
.bval{width:46px;font-size:9.5px;font-weight:600;flex-shrink:0}
.bbadge{flex-shrink:0}
.sgt{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:5px}
.sgt th{background:var(--teal);color:#fff;font-weight:600;padding:4px 7px;font-size:9.5px;text-align:left}
.sgt td{padding:3.5px 7px;border-bottom:1px solid #f1f5f9}
.sgt tr:last-child td{border-bottom:none}
.sgt tr:nth-child(even) td{background:#f9fafb}
.minibar{display:inline-block;vertical-align:middle;width:50px;height:6px;background:#e5e7eb;border-radius:10px;overflow:hidden;margin-left:4px}
.minibar span{display:block;height:100%;border-radius:10px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.four{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px}
.sc{border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.sc-lbl{font-size:8.5px;color:var(--ink-lt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.sc-val{font-size:18px;font-weight:700;color:var(--ink);line-height:1}
.sc-sub{font-size:8.5px;color:var(--ink-lt);margin-top:2px}
.tbox{border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.tbox-t{font-size:9.5px;font-weight:600;color:var(--ink-mid);margin-bottom:5px}
.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #f8f9fa;font-size:10.5px}
.trow:last-child{border-bottom:none}
.tr-l{color:var(--ink-mid)}
.tr-v{font-weight:600;color:var(--ink)}
.up{color:var(--green)!important}
.dn{color:var(--orange)!important}
.pfooter{position:absolute;bottom:5mm;left:11mm;right:11mm;display:flex;justify-content:space-between;align-items:center;font-size:7.5px;color:var(--ink-lt);border-top:1px solid var(--border);padding-top:3px}
@media print{#controls{display:none!important}#report-area{padding:0}.page{box-shadow:none;border-radius:0;margin:0;width:100%}}
</style>

<script>
// ── physiqueRating
function physiqueRating(rating){
  var r=parseInt(rating)||0;
  var C='<'+'/';  // Avoid browser parsing <\/tag> inside script
  function bp(cx,fxp,bxp,axp,abdp,yNk,ySh,yCh,yWa,yBe,yGr,yTh,yKn,yAn,yFt){
    return 'M '+(cx-1)+','+yNk
      +' L '+(bxp-1)+','+yNk
      +' Q '+bxp+','+ySh+' '+bxp+','+yCh
      +' Q '+(bxp+1)+','+yWa+' '+bxp+','+yBe
      +' Q '+bxp+','+yGr+' '+(bxp-2)+','+(yGr+4)
      +' L '+(cx+1)+','+yFt
      +' L '+fxp+','+yFt+' L '+fxp+','+yAn
      +' L '+fxp+','+yKn+' L '+(fxp+1)+','+yTh
      +' L '+(fxp+1)+','+yGr
      +' Q '+axp+','+yBe+' '+axp+','+(yWa+4)
      +' Q '+(abdp?(fxp-1):fxp)+','+yCh+' '+fxp+','+ySh
      +' L '+(cx-1)+','+yNk+' Z';
  }
  function makeSVG(n){
    var row=Math.floor((n-1)/3), col=(n-1)%3;
    var MC=[[3,2],[6,4],[9,5]];
    var fd=MC[col][0], bd=MC[col][1];
    var FR=[[7,5,5,7],[5,3,3,6],[3,2,1,5]];
    var fp_f=FR[row][0],fp_b=FR[row][1],fp_a=FR[row][2],hrf=FR[row][3];
    var abd=[4,2,0][row], abd_fat=abd+fp_a;
    // Coordenadas: frente a la izquierda (cx-fd), espalda a la derecha (cx+bd)
    var cx=26, fx=cx-fd, bx=cx+bd, ax=fx-abd;
    var fx_fat=cx-fd-fp_f, bx_fat=cx+bd+fp_b, ax_fat=Math.max(0,fx_fat-abd_fat);
    var yNk=17,ySh=21,yCh=28,yWa=36,yBe=44,yGr=52,yTh=62,yKn=71,yAn=81,yFt=87;
    var df=bp(cx,fx_fat,bx_fat,ax_fat,abd_fat,yNk,ySh,yCh,yWa,yBe,yGr,yTh,yKn,yAn,yFt);
    var dm=bp(cx,fx,bx,ax,abd,yNk,ySh,yCh,yWa,yBe,yGr,yTh,yKn,yAn,yFt);
    return '<svg viewBox="0 0 52 90" width="48" height="83" xmlns="http://www.w3.org/2000/svg">'
      +'<path d="'+df+'" fill="#BFDBFE" stroke="#93C5FD" stroke-width="0.8"/>'
      +'<circle cx="'+cx+'" cy="10" r="'+hrf+'" fill="#BFDBFE" stroke="#93C5FD" stroke-width="0.8"/>'
      +'<path d="'+dm+'" fill="#1E40AF"/>'
      +'<circle cx="'+cx+'" cy="10" r="5" fill="#1E40AF"/>'
      +C+'svg>';
  }
  var axY='<div style="display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:0 2px 14px 0;font-size:6px;color:#93C5FD;font-weight:600;min-width:13px">'
    +'<span>Alta'+C+'span>'
    +'<span style="writing-mode:vertical-rl;transform:rotate(180deg);font-weight:400;font-size:5.5px">% Grasa'+C+'span>'
    +'<span style="font-size:7px">&#8595;'+C+'span>'
    +'<span>Baja'+C+'span>'
    +C+'div>';
  var grid='<div style="display:flex;flex-direction:column;gap:1px">';
  for(var fila=0;fila<3;fila++){
    grid+='<div style="display:flex;gap:1px">';
    for(var c=0;c<3;c++){
      var n=fila*3+c+1, active=(n===r);
      var bg=active?'#FEF9C3':'transparent';
      var brd=active?'1.5px solid #F97316':'0.5px solid #D1D5DB';
      var star=active?'<div style="font-size:6px;color:#ef4444;text-align:center;line-height:1">&#9733;'+C+'div>':'';
      grid+='<div style="border:'+brd+';border-radius:2px;background:'+bg+';padding:1px 0;display:flex;flex-direction:column;align-items:center">'
        +makeSVG(n)+star+C+'div>';
    }
    grid+=C+'div>';
  }
  grid+=C+'div>';
  var axX='<div style="display:flex;justify-content:space-between;padding-top:1px;font-size:5.5px;color:#1E40AF;font-weight:600">'
    +'<span>Baja'+C+'span><span style="font-weight:400">&#205;ndice de masa muscular &#8594;'+C+'span><span>Alta'+C+'span>'+C+'div>';
  var leg='<div style="display:flex;flex-direction:column;gap:4px;padding-left:5px;min-width:26px;max-width:26px;align-self:center">'
    +'<div style="display:flex;align-items:center;gap:2px;font-size:5.5px;line-height:1.3"><span style="width:6px;height:6px;border-radius:50%;background:#1E40AF;display:inline-block;flex-shrink:0">'+C+'span>Representa el m&uacute;sculo'+C+'div>'
    +'<div style="display:flex;align-items:center;gap:2px;font-size:5.5px;line-height:1.3"><span style="width:6px;height:6px;border-radius:50%;background:#BFDBFE;border:0.5px solid #93C5FD;display:inline-block;flex-shrink:0">'+C+'span>Representa la grasa'+C+'div>'
    +'<div style="border-top:0.5px solid #e5e7eb;margin:3px 0">'+C+'div>'
    +'<div style="font-size:8px;font-weight:700">Rating '+r+'/9'+C+'div>'
    +'<div style="font-size:5.5px;color:var(--ink-lt)">Delgado y musculoso'+C+'div>'
    +C+'div>';
  return '<div style="display:flex;align-items:flex-start">'
    +'<div><div style="display:flex">'+axY+'<div>'+grid+axX+C+'div>'+C+'div>'+C+'div>'
    +leg+C+'div>';
}
</script>
<script>
var DEMO = {
  full_name:'Stella Calderón', measurement_date:'16/04/2026 · 10:06',
  height_cm:174, age:48, sex:'Femenino', weight_kg:53.9, bmi:21.6,
  heart_rate:68, bmr_kcal:1274, visceral_fat:3, metabolic_age:33,
  body_fat_pct:18.7, fat_label:'Atlético',
  fat_ref_normal_min:23, fat_ref_normal_max:35, fat_ref_age_label:'40–49',
  total_body_water_l:29.75, tbw_pct:55.2,
  muscle_mass_kg:41.6, smm_kg:35.0, smm_index:11.56,
  bone_mass_kg:2.2, bone_pct:4.08, bone_label:'Leve',
  protein_kg:8.76, protein_pct:16.3, protein_label:'Alto',
  physique_rating:8,
  fat_trunk_pct:9.5, fat_trunk_lvl:40, fat_trunk_label:'Atlética',
  fat_arm_l_pct:21.2, fat_arm_l_lvl:76, fat_arm_l_label:'Atlética',
  fat_arm_r_pct:19.0, fat_arm_r_lvl:68, fat_arm_r_label:'Atlética',
  fat_leg_l_pct:31.9, fat_leg_l_lvl:100, fat_leg_l_label:'Normal',
  fat_leg_r_pct:31.6, fat_leg_r_lvl:99, fat_leg_r_label:'Normal',
  fat_trunk_ref_min:20, fat_trunk_ref_max:28, fat_trunk_ref_ideal:24,
  fat_arm_ref_min:23, fat_arm_ref_max:33, fat_arm_ref_ideal:28,
  fat_leg_ref_min:26, fat_leg_ref_max:38, fat_leg_ref_ideal:32,
  muscle_trunk_kg:24.8, muscle_trunk_pct:100,
  muscle_arm_l_kg:1.95, muscle_arm_l_pct:81, muscle_arm_l_score:54,
  muscle_arm_r_kg:2.05, muscle_arm_r_pct:85, muscle_arm_r_score:59,
  muscle_leg_l_kg:6.3, muscle_leg_l_pct:76, muscle_leg_l_score:73,
  muscle_leg_r_kg:6.5, muscle_leg_r_pct:79, muscle_leg_r_score:73,
  muscle_quality_total:69, muscle_quality_label:'Bueno',
  balance_arm_pct:4.9, balance_leg_pct:3.1, leg_score:73,
  ecw_l:11.19, icw_l:18.56, ecw_icw_ratio:0.6,
  prev_weight:51.0, prev_muscle:40.45, prev_fat_pct:16.4, prev_bmr:1240,
  trend_from:'2023-03', trend_to:'2026-04',
  display_signature:'García Paz - Nutricionista'
};

// ── Helpers ──────────────────────────────────────────────────
function f(v,d){d=d===undefined?1:d;return (v!=null&&v!=='')?(parseFloat(v).toFixed(d)):'—';}
function fi(v){return (v!=null&&v!=='')?(Math.round(parseFloat(v)))+'':'—';}
function pct(v,max){return Math.min(100,parseFloat(v)/parseFloat(max)*100);}
function bc(lbl){
  var l=(lbl||'').toLowerCase();
  if(l.indexOf('sin sarcopenia')>=0||l.indexOf('atlét')>=0||l.indexOf('fitness')>=0||l.indexOf('excelente')>=0||l.indexOf('saludable')>=0||l.indexOf('bueno')>=0) return 'b-g';
  if(l.indexOf('normal')>=0) return 'b-b';
  if(l.indexOf('bajo')>=0||l.indexOf('baja')>=0||l.indexOf('riesgo')>=0||l.indexOf('sarcopenia')>=0) return 'b-r';
  if(l.indexOf('↑')>=0||l.indexOf('alta')>=0||l.indexOf('alto')>=0||l.indexOf('elevad')>=0) return 'b-o';
  if(l.indexOf('leve')>=0||l.indexOf('moderado')>=0) return 'b-o';
  return 'b-t';
}
function bcolor(lbl){
  var l=(lbl||'').toLowerCase();
  if(l.indexOf('atlét')>=0||l.indexOf('normal')>=0||l.indexOf('excelente')>=0) return '#16a34a';
  if(l.indexOf('leve')>=0||l.indexOf('moderado')>=0) return '#ea580c';
  return '#0d7377';
}
function mkBar(label,val,max,unit,badge,refMin,refMax,rangeLabel){
  if(val==null||val==='') return '';
  var w=pct(val,max), col=bcolor(badge);
  var refMinPct=refMin?Math.min(100,parseFloat(refMin)/max*100):null;
  var refMaxPct=refMax?Math.min(100,parseFloat(refMax)/max*100):null;
  var bar='<div class="btrk" style="position:relative">';
  if(refMinPct!=null&&refMaxPct!=null){
    bar+='<div style="position:absolute;left:'+refMinPct+'%;width:'+(refMaxPct-refMinPct)+'%;height:100%;background:#fca5a5;opacity:0.45;border-radius:20px"><\/div>';
  }
  bar+='<div class="bfil" style="width:'+w+'%;background:'+col+'"><\/div>';
  bar+='<div style="position:absolute;left:'+w+'%;top:-2px;bottom:-2px;width:2px;background:'+col+';border-radius:1px;transform:translateX(-50%)"><\/div>';
  bar+='<\/div>';
  var extraInfo=rangeLabel?'<span style="font-size:8px;color:var(--ink-lt);margin-left:4px">'+rangeLabel+'<\/span>':'';
  return '<div class="brow"><span class="blbl">'+label+'<\/span>'
    +bar
    +'<span class="bval">'+f(val)+' <span style="font-size:8px;font-weight:400;color:var(--ink-lt)">'+unit+'<\/span><\/span>'
    +(badge?'<span class="b '+bc(badge)+' bbadge">'+badge+'<\/span>':'')
    +'<\/div>'
    +(refMinPct!=null?'<div style="display:flex;padding-left:90px;font-size:7.5px;color:var(--ink-lt);margin-top:-2px;margin-bottom:2px">Normal '+refMin+'–'+refMax+'<\/div>':'');
}
function mkMinibar(pct_v,col){
  var w=Math.min(100,parseFloat(pct_v)||0);
  return '<span class="minibar"><span style="width:'+w+'%;background:'+col+'"><\/span><\/span>';
}

// ── Segmental row (grasa) — sin columna nivel relativo
function srow(lbl,pct_v,badge,ref){
  return '<tr><td>'+lbl+'<\/td>'
    +'<td>'+f(pct_v)+'%<\/td>'
    +'<td><span class="b '+bc(badge)+'">'+badge+'<\/span><\/td>'
    +'<td style="font-size:8.5px;color:var(--ink-lt)">'+ref+'<\/td><\/tr>';
}

// ── Muscular segmental row — Cantidad + Clasif. cantidad + Score + Clasif. score
function mrow(lbl,kg,rangeKg,kgClassif,score,classif,ref){
  return '<tr><td>'+lbl+'<\/td>'
    +'<td>'+(kg!=null?f(kg):'—')+'<\/td>'
    +'<td style="font-size:8.5px;color:var(--ink-lt)">'+(rangeKg||'—')+'<\/td>'
    +'<td>'+(kgClassif?'<span class="b '+bc(kgClassif)+'">'+kgClassif+'<\/span>':'—')+'<\/td>'
    +'<td>'+(score||'—')+'<\/td>'
    +'<td>'+(classif?'<span class="b '+bc(classif)+'">'+classif+'<\/span>':'—')+'<\/td>'
    +'<td style="font-size:8.5px;color:var(--ink-lt)">'+(ref!='—'?'score ('+ref+')':ref)+'<\/td><\/tr>';
}

// ── PAGE 1 ───────────────────────────────────────────────────
function page1(d){
  var fm=parseFloat(d.weight_kg)*parseFloat(d.body_fat_pct)/100;
  var hcell=d.heart_rate
    ?'<div class="vc hi"><div class="vc-lbl">Frec. Cardíaca<\/div><div class="vc-val">'+fi(d.heart_rate)+'<\/div><div class="vc-unit">lpm<\/div><\/div>'
    :'<div class="vc"><\/div>';

  var html='<div class="page" id="p1">';

    +'<\/div>';
  var ecwFlex=d.ecw_l||1, icwFlex=d.icw_l||1;
  html+='<div style="padding:7px 10px;background:#f9fafb;border:1px solid var(--border);border-radius:7px;margin-bottom:10px">'
    +'<div style="display:flex;gap:2px;margin:4px 0 6px">'
    +'<div style="flex:'+ecwFlex+';height:14px;background:#bfdbfe;border-radius:4px 0 0 4px;display:flex;align-items:center;justify-content:center"><span style="font-size:8px;font-weight:600;color:#1d4ed8">AEC '+f(d.ecw_l)+'L ('+(ecwPct||'—')+'%)<\/span><\/div>'
    +'<div style="flex:'+icwFlex+';height:14px;background:#bbf7d0;border-radius:0 4px 4px 0;display:flex;align-items:center;justify-content:center"><span style="font-size:8px;font-weight:600;color:#15803d">AIC '+f(d.icw_l)+'L ('+(icwPct||'—')+'%)<\/span><\/div>'
    +'<\/div>'
    +'<div style="height:12px;background:linear-gradient(90deg,#fca5a5 0%,#fde68a 35%,#86efac 55%,#86efac 100%);border-radius:20px;position:relative">'
    +(d.ecw_icw_ratio?'<div style="position:absolute;left:'+Math.min(96,parseFloat(d.ecw_icw_ratio)/0.9*100)+'%;top:-2px;bottom:-2px;width:3px;background:var(--red);border-radius:2px;transform:translateX(-50%)"><\/div>':'')
    +'<\/div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:3px;font-size:7.5px;color:var(--ink-lt)"><span>0.4 ↓ deshidratación<\/span><span>±10–15%<\/span><span style="color:var(--orange)">0.65 ↑ retención<\/span><\/div>'
    +'<\/div>';
  html+='<div class="st">Control de peso y evolución<\/div>';
  var hasPrev=(dw!=null)||(dm!=null)||(df!=null)||(db!=null);
  if(hasPrev){
    html+='<div class="two" style="margin-bottom:8px">';
    html+='<div>'
      +'<div class="tbox" style="margin-bottom:5px"><div class="tbox-t">Control de peso por composición<\/div>'
      +'<div class="trow"><span class="tr-l">Peso<\/span><span class="tr-v">'+f(d.weight_kg)+' kg<\/span><\/div>'
      +'<div class="trow"><span class="tr-l">MLG<\/span><span class="tr-v">'+mlg+' kg<\/span><\/div>'
      +'<div class="trow"><span class="tr-l">Masa grasa<\/span><span class="tr-v">'+fmkg+' kg ('+f(d.body_fat_pct)+'%)<\/span><\/div>'
      +'<\/div>'
      +'<\/div>';
    html+='<div>'
      +'<div class="tbox" style="margin-bottom:5px"><div class="tbox-t">Tendencia '+(d.trend_from||'')+' → '+(d.trend_to||'')+'<\/div>'
      +(dw!=null?'<div class="trow"><span class="tr-l">Peso<\/span><span class="tr-v '+tc(dw)+'">'+arr(dw)+' '+delt(dw)+' kg<\/span><\/div>':'')
      +(dm!=null?'<div class="trow"><span class="tr-l">Masa muscular<\/span><span class="tr-v '+tc(dm)+'">'+arr(dm)+' '+delt(dm)+' kg<\/span><\/div>':'')
      +(df!=null?'<div class="trow"><span class="tr-l">% grasa<\/span><span class="tr-v '+(parseFloat(df)<0?'up':'dn')+'">'+arr(-parseFloat(df))+' '+delt(df)+'%<\/span><\/div>':'')
      +(db!=null?'<div class="trow"><span class="tr-l">TMB<\/span><span class="tr-v '+tc(db)+'">'+arr(db)+' '+delt(db,0)+' kcal<\/span><\/div>':'')
      +'<\/div>'
      +'<div id="chart-slot"><\/div>'
      +'<\/div>';
    html+='<\/div>';
  } else {
    html+='<div style="margin-bottom:8px">'
      +'<div class="tbox"><div class="tbox-t">Control de peso por composición<\/div>'
      +'<div class="trow"><span class="tr-l">Peso<\/span><span class="tr-v">'+f(d.weight_kg)+' kg<\/span><\/div>'
      +'<div class="trow"><span class="tr-l">MLG<\/span><span class="tr-v">'+mlg+' kg<\/span><\/div>'
      +'<div class="trow"><span class="tr-l">Masa grasa<\/span><span class="tr-v">'+fmkg+' kg ('+f(d.body_fat_pct)+'%)<\/span><\/div>'
      +'<div style="font-size:8.5px;color:var(--ink-lt);margin-top:6px;padding-top:5px;border-top:0.5px solid var(--border)">Primera medición registrada. Las comparaciones de evolución aparecerán a partir de la próxima medición.<\/div>'
      +'<\/div>'
      +'<\/div>';
  }
  html+='<div class="st">Referencias científicas<\/div>';
  html+='<div style="font-size:7.5px;color:var(--ink-lt);line-height:1.7;column-count:2;column-gap:14px">'
    +'<strong>Agua corporal<\/strong> [1] Watson PE et al. Am J Clin Nutr. 1980. [2] Chumlea WC et al. Kidney Int. 2001. [14] De Lorenzo A et al. J Appl Physiol. 1997. [15] Kyle UG et al. ESPEN. Clin Nutr. 2004.<br>'
    +'<strong>Proteína · Masa ósea · % Grasa<\/strong> [3] Heymsfield SB et al. 1997. [4] Tanita Corp. Body Composition Guide. [5] Looker AC et al. 1998. [7] Gallagher D et al. 2000. [8] Li C et al. 2012.<br>'
    +'<strong>Músculo · Sarcopenia · Grasa visceral<\/strong> [9] Tanita Corp. Manual InnerScan Dual. [12] Janssen I et al. 2000. [13] Cruz-Jentoft AJ et al. EWGSOP2. Age Ageing. 2019. [16] Tanita Europe. Visceral Fat Rating. [17] Despres JP. Nature Rev Cardiol. 2012.'
    +'<\/div>';
  html+='<div class="pfooter"><span>SmartBioScan · Reporte de Composición Corporal<\/span><span>'+d.full_name+' · '+d.measurement_date+'<\/span><span>Página 3 de 3<\/span><\/div>';
  html+='<\/div>';
  return html;
}

// ── Chart injection ───────────────────────────────────────────
function injectChart(d) {
  var slot = document.getElementById('chart-slot');
  if (!slot || !d.prev_weight) return;
  // Usar history_series (N puntos) si está disponible; si no, fallback 2 puntos
  var hs=d.history_series&&d.history_series.length>1?d.history_series:null;
  var W=hs?hs.map(function(h){return parseFloat(h.weight_kg);}):
           [parseFloat(d.prev_weight),parseFloat(d.weight_kg)];
  var M=hs?hs.map(function(h){return parseFloat(h.muscle_kg);}):
           [parseFloat(d.prev_muscle),parseFloat(d.muscle_mass_kg)];
  var F=hs?hs.map(function(h){return parseFloat(h.fat_pct);}):
           [parseFloat(d.prev_fat_pct),parseFloat(d.body_fat_pct)];
  var labels=hs?hs.map(function(h){return h.label||h.date;}):[d.trend_from||'Ant.',d.trend_to||'Act.'];
  var pw=360,ph=140,pL=36,pR=22,pT=20,pB=34;
  var iH=ph-pT-pB;
  var allWM=W.concat(M);
  var minWM=Math.min.apply(null,allWM)-2,maxWM=Math.max.apply(null,allWM)+2;
  function sY(v){return pT+iH-((v-minWM)/(maxWM-minWM))*iH;}
  var dArr=hs?hs.map(function(h){return h.date;}):labels;
  var tArr=dArr.map(function(l){var d=new Date(l);return isNaN(d.getTime())?null:d.getTime();});
  var useTime=tArr.every(function(t){return t!==null;})&&tArr[tArr.length-1]>tArr[0];
  if(!useTime){tArr=labels.map(function(_,i){return i;});}
  var tMin=tArr[0],tMax=tArr[tArr.length-1],tRng=tMax>tMin?tMax-tMin:1;
  function sX(i){return pL+((tArr[i]-tMin)/tRng)*(pw-pL-pR);}
  var minF=Math.min.apply(null,F)-2,maxF=Math.max.apply(null,F)+2;
  function sYF(v){return pT+iH-((v-minF)/(maxF-minF))*iH;}
  var leg='<text x="'+pL+'" y="10" font-size="11" font-weight="700" fill="#374151">Evolución<\/text>'
    +'<line x1="'+(pL+58)+'" y1="9" x2="'+(pL+70)+'" y2="9" stroke="#0d7377" stroke-width="2"\/>'
    +'<text x="'+(pL+72)+'" y="11" font-size="9" font-weight="600" fill="#0d7377">Peso kg<\/text>'
    +'<line x1="'+(pL+112)+'" y1="9" x2="'+(pL+124)+'" y2="9" stroke="#16a34a" stroke-width="2"\/>'
    +'<text x="'+(pL+126)+'" y="11" font-size="9" font-weight="600" fill="#16a34a">Músculo kg<\/text>'
    +'<line x1="'+(pL+187)+'" y1="9" x2="'+(pL+199)+'" y2="9" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="3,2"\/>'
    +'<text x="'+(pL+201)+'" y="11" font-size="9" font-weight="600" fill="#ea580c">% Grasa<\/text>';
  var g='';
  [0,.33,.67,1].forEach(function(t){g+='<line x1="'+pL+'" y1="'+(pT+t*iH).toFixed(1)+'" x2="'+(pw-pR)+'" y2="'+(pT+t*iH).toFixed(1)+'" stroke="#e5e7eb" stroke-width="0.5"/>';});
  var wpArr=W.map(function(v,i){return sX(i).toFixed(1)+','+sY(v).toFixed(1);}).join(' ');
  var mpArr=M.map(function(v,i){return sX(i).toFixed(1)+','+sY(v).toFixed(1);}).join(' ');
  var fpArr=F.map(function(v,i){return sX(i).toFixed(1)+','+sYF(v).toFixed(1);}).join(' ');
  var dots='';
  // Para N>4 puntos: solo mostrar dot+label en primer y último; intermedios solo dot pequeño
  var manyPts=W.length>8;
  W.forEach(function(v,i){
    var showLbl=!manyPts||i===0||i===W.length-1;
    dots+='<circle cx="'+sX(i).toFixed(1)+'" cy="'+sY(v).toFixed(1)+'" r="'+(manyPts?2:3.5)+'" fill="#0d7377"\/>';
    if(showLbl)dots+='<text x="'+sX(i).toFixed(1)+'" y="'+(sY(v)-6).toFixed(1)+'" font-size="7" fill="#0d7377" text-anchor="middle">'+v+'<\/text>';
  });
  M.forEach(function(v,i){
    var showLbl=!manyPts||i===0||i===M.length-1;
    var a=i?'start':'end';
    dots+='<circle cx="'+sX(i).toFixed(1)+'" cy="'+sY(v).toFixed(1)+'" r="'+(manyPts?2:3.5)+'" fill="#16a34a"\/>';
    if(showLbl)dots+='<text x="'+(sX(i)+(i?7:-7)).toFixed(1)+'" y="'+(sY(v)-6).toFixed(1)+'" font-size="7" fill="#16a34a" text-anchor="'+a+'">'+v+'<\/text>';
  });
  F.forEach(function(v,i){
    var showLbl=!manyPts||i===0||i===F.length-1;
    var isLast=i===F.length-1;
    var a=(i===0||isLast)?'end':'start';
    var xOff=(i===0||isLast)?-5:5;
    dots+='<circle cx="'+sX(i).toFixed(1)+'" cy="'+sYF(v).toFixed(1)+'" r="'+(manyPts?1.5:2.5)+'" fill="#ea580c"\/>';
    if(showLbl)dots+='<text x="'+(sX(i)+xOff).toFixed(1)+'" y="'+(sYF(v)+3).toFixed(1)+'" font-size="7" fill="#ea580c" text-anchor="'+a+'">'+v+'%<\/text>';
  });
  // Eje X: tick por cada medición, rotado -45° con text-anchor="end"
  var xl=labels.map(function(l,i){
    var x=sX(i).toFixed(1), y=(ph-20).toFixed(1);
    return '<text x="'+x+'" y="'+y+'" font-size="7.5" fill="#9ca3af" text-anchor="end"'
      +' transform="rotate(-45,'+x+','+y+')">'+l+'<\/text>';
  }).join('');
  slot.innerHTML='<div style="border:1px solid #d1d5db;border-radius:7px;padding:6px 8px">'
    +'<svg viewBox="0 0 '+pw+' '+ph+'" style="width:100%;height:auto">'
    +leg
    +g
    +'<polyline points="'+wpArr+'" fill="none" stroke="#0d7377" stroke-width="2" stroke-linejoin="round"/>'
    +'<polyline points="'+mpArr+'" fill="none" stroke="#16a34a" stroke-width="2" stroke-linejoin="round"/>'
    +'<polyline points="'+fpArr+'" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="3,2" stroke-linejoin="round"/>'
    +dots+xl
    +'<\/svg><\/div>';
}

// ── CSV Parser ────────────────────────────────────────────────
function parseCSV(text){
  var lines=text.trim().split('\n');
  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
  return lines.slice(1).filter(function(l){return l.trim();}).map(function(line){
    var vals=line.split(',').map(function(v){return v.trim().replace(/^"|"$/g,'');});
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    return obj;
  });
}

// ── Render ────────────────────────────────────────────────────
function render(d){
  document.getElementById('patient-label').textContent=d.full_name||'—';
  document.getElementById('report-area').innerHTML=page1(d)+page2(d)+page3(d);
  injectChart(d);
}

// ── CSV upload ────────────────────────────────────────────────
document.getElementById('csv-input').addEventListener('change',function(e){
  var file=e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var rows=parseCSV(ev.target.result);
      if(!rows.length){alert('CSV vacío o mal formateado');return;}
      render(rows[0]);
    }catch(err){alert('Error al procesar CSV: '+err.message);}
  };
  reader.readAsText(file);
});

// ── Init ──────────────────────────────────────────────────────
render(DEMO);
</script>
